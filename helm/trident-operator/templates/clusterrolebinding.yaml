apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trident-operator
  labels:
    app: operator.trident.netapp.io
subjects:
  - kind: ServiceAccount
    name: trident-operator
    namespace: {{ include "trident.namespace" . }}
roleRef:
  kind: ClusterRole
  name: trident-operator
  apiGroup: rbac.authorization.k8s.io
